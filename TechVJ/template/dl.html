    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050505; color: #fff; background-image: radial-gradient(circle at 50% -20%, #3b0764 0%, #050505 80%); min-height: 100vh; padding: 15px; }

            <a href="https://whatsapp.com/channel/0029VbCnqlq3bbUxmrkLQS23" class="social-btn bg-green-500 text-white p-3 text-xs flex items-center justify-center gap-2"><i class="fab fa-whatsapp"></i> WHATSAPP</a>
