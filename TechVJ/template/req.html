    <style>
        body {
            background-color: #050505;
            color: #ffffff;
            font-family: 'Outfit', sans-serif;
            background-image: radial-gradient(circle at 50% -20%, #3b0764 0%, #050505 80%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }

        .premium-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            width: 90%;
            max-width: 500px;
            padding: 45px 25px;
            text-align: center;
        }

        .social-btn {
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border-radius: 16px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 14px;
            text-decoration: none !important;
            color: white;
        }

        .social-btn:hover {
            transform: scale(1.05) translateY(-3px);
            filter: brightness(1.2);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .tg-btn { background: #0088cc; }
        .yt-btn { background: #ff0000; }
        .ig-btn { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
        .wa-btn { background: #25d366; }

        .loader-ring {
            display: inline-block;
            width: 55px;
            height: 55px;
            border: 4px solid rgba(167, 139, 250, 0.1);
            border-left-color: #a78bfa;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 25px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
