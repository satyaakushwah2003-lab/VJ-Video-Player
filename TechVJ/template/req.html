<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="shortcut icon" href="https://i.ibb.co/qJyZWCv/20230629-081948-0000.png" type="image/x-icon">
    <meta property="og:image" content="https://i.ibb.co/qJyZWCv/20230629-081948-0000.png" itemprop="thumbnailUrl">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{file_name}} | Anime Doses</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        body {
            background-color: #050505;
            color: #ffffff;
            font-family: 'Outfit', sans-serif;
            background-image: radial-gradient(circle at 50% -20%, #3b0764 0%, #050505 80%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }

        .premium-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            width: 90%;
            max-width: 500px;
            padding: 45px 25px;
            text-align: center;
        }

        .social-btn {
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border-radius: 16px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 14px;
            text-decoration: none !important;
            color: white;
        }

        .social-btn:hover {
            transform: scale(1.05) translateY(-3px);
            filter: brightness(1.2);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .tg-btn { background: #0088cc; }
        .yt-btn { background: #ff0000; }
        .ig-btn { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
        .wa-btn { background: #25d366; }

        .loader-ring {
            display: inline-block;
            width: 55px;
            height: 55px;
            border: 4px solid rgba(167, 139, 250, 0.1);
            border-left-color: #a78bfa;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 25px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>

    <script>
        var userId = "{{user_id}}";
        var hasSpent30Seconds = false;
        var clickCounted = false;

        function setSpentTimeFlag() {
            hasSpent30Seconds = true;
        }

        setTimeout(setSpentTimeFlag, 30000); // 30 seconds timer

        document.addEventListener("click", function(event) {
            if (hasSpent30Seconds && !clickCounted) {
                clickCounted = true;
                fetch('/click-counter', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: userId })
                })
                .catch(error => console.error('Error:', error));
            }
        });
    </script>
</head>

<body>

    <div class="premium-card">
        <header class="mb-8">
            <h1 class="text-3xl font-black italic tracking-tighter uppercase">
                ANIME<span class="text-purple-500">DOSES</span>
            </h1>
        </header>

        <div class="loader-ring"></div>

        <h2 class="text-xl font-bold mb-3 tracking-tight">Processing Content...</h2>
        
        <div class="bg-white/5 border border-white/10 rounded-2xl p-4 mb-8">
            <p class="text-zinc-500 text-[10px] uppercase tracking-[0.2em] mb-1">File Name</p>
            <p class="text-sm font-semibold text-purple-300 line-clamp-2 leading-relaxed italic">
                {{file_name}}
            </p>
        </div>

        <a href="https://t.me/AnimeDoses" target="_blank" class="social-btn tg-btn py-5 text-xl mb-10 shadow-lg shadow-blue-500/20">
            <i class="fab fa-telegram-plane text-2xl"></i> JOIN MAIN CHANNEL
        </a>

        <div class="space-y-4">
            <p class="text-[10px] text-zinc-500 uppercase tracking-[0.3em] font-bold">Follow Our Network</p>
            
            <div class="grid grid-cols-2 gap-3">
                <a href="https://youtube.com/@thebreakdownbro?si=HVcb2KRLTimzrK-g" target="_blank" class="social-btn yt-btn text-xs">
                    <i class="fab fa-youtube"></i> YouTube
                </a>
                <a href="https://www.instagram.com/thebreakdownbro" target="_blank" class="social-btn ig-btn text-xs">
                    <i class="fab fa-instagram"></i> Instagram
                </a>
                <a href="https://whatsapp.com/channel/0029VbCnqlq3bbUxmrkLQS23" target="_blank" class="social-btn wa-btn text-xs">
                    <i class="fab fa-whatsapp"></i> WhatsApp
                </a>
                <a href="https://t.me/MOVIES24X7_BOT" target="_blank" class="social-btn bg-zinc-800 text-xs">
                    <i class="fas fa-robot"></i> Support Bot
                </a>
            </div>
        </div>

        <footer class="mt-12 pt-6 border-t border-white/5">
            <p class="text-[9px] text-zinc-600 uppercase tracking-widest font-bold italic">
                © 2026 ANIME DOSES | THE BREAKDOWN BROS
            </p>
        </footer>
    </div>

</body>
</html>
