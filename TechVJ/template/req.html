<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="shortcut icon" href="https://i.ibb.co/qJyZWCv/20230629-081948-0000.png" type="image/x-icon">
    <meta property="og:image" content="https://i.ibb.co/qJyZWCv/20230629-081948-0000.png" itemprop="thumbnailUrl">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{file_name}} | {{name}}</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body { background-color: #050505; color: #ffffff; font-family: 'Outfit', sans-serif; background-image: radial-gradient(circle at 50% -20%, #3b0764 0%, #050505 80%); min-height: 100vh; margin: 0; }
        .premium-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 28px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7); }
        .social-btn { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); border-radius: 16px; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 10px; text-decoration: none !important; color: white; }
        .social-btn:hover { transform: scale(1.05) translateY(-3px); filter: brightness(1.2); box-shadow: 0 10px 20px rgba(0,0,0,0.4); }
        
        /* Brand Colors */
        .btn-tg { background: #0088cc; }
        .btn-yt { background: #ff0000; }
        .btn-ig { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
        .btn-wa { background: #25d366; }
        .btn-bot { background: #3f3f46; } /* Zinc-700 */

        .plyr--full-ui.plyr--video .plyr__control--overlaid { background: #a78bfa; }
    </style>

    <script>
        var userId = "{{user_id}}";
        var hasSpent30Seconds = false;
        var clickCounted = false;
        function setSpentTimeFlag() { hasSpent30Seconds = true; }
        setTimeout(setSpentTimeFlag, 30000);
        document.addEventListener("click", function(event) {
            if (hasSpent30Seconds && !clickCounted) {
                clickCounted = true;
                fetch('/click-counter', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: userId })
                }).catch(error => console.error('Error:', error));
            }
        });
    </script>
</head>

<body class="p-4 md:p-8">
    <div class="max-w-4xl mx-auto">
        
        <header class="text-center mb-8">
            <h1 class="text-3xl font-black italic tracking-tighter mb-4">
                <span class="bg-clip-text text-transparent bg-gradient-to-r from-pink-500 to-violet-500 uppercase">{{name}}</span>
            </h1>
            <div class="bg-white/5 border border-white/10 px-4 py-2 rounded-2xl inline-block max-w-full">
                <p class="text-zinc-300 text-xs font-medium truncate italic">{{file_name}}</p>
            </div>
        </header>

        <div class="premium-card p-2 mb-8 overflow-hidden">
            <video id="player" class="player rounded-2xl" playsinline controls>
                {% if file_url %}<source src="{{file_url}}" type="video/mp4">{% endif %}
            </video>
        </div>

        <div class="mb-10 text-center">
            <p class="text-[10px] text-zinc-500 uppercase tracking-[0.3em] font-bold mb-4 italic">Choose Your Player</p>
            <div class="grid grid-cols-2 md:grid-cols-3 gap-3">
                <a href="intent:{{file_url}}#Intent;package=com.mxtech.videoplayer.ad;S.title={{file_name}};end" class="social-btn bg-blue-700 py-3 text-xs">
                    <i class="fas fa-play-circle text-lg"></i> MX PLAYER
                </a>
                <a href="vlc://{{file_url}}" class="social-btn bg-orange-500 py-3 text-xs">
                    <i class="fas fa-orange text-lg"></i> VLC PLAYER
                </a>
                <a href="intent:{{file_url}}#Intent;package=video.player.videoplayer;S.title={{file_name}};end" class="social-btn bg-green-600 py-3 text-xs md:col-span-1 col-span-2">
                    <i class="fas fa-play text-lg"></i> ALL PLAYER
                </a>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-10">
            <a href="{{file_url}}" download="{{file_name}}" class="social-btn bg-white text-black py-4 text-lg border-b-4 border-zinc-300">
                <i class="fas fa-cloud-download-alt"></i> FAST DOWNLOAD
            </a>
            <a href="https://t.me/AnimeDoses" target="_blank" class="social-btn btn-tg py-4 text-lg shadow-lg shadow-blue-500/20">
                <i class="fab fa-telegram-plane"></i> JOIN TELEGRAM
            </a>
        </div>

        <div class="mb-12">
            <p class="text-[10px] text-zinc-500 uppercase tracking-[0.3em] font-bold mb-4 text-center">Connect With Us</p>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                <a href="https://youtube.com/@thebreakdownbro?si=SVlaAaLZE1LbbsGm" target="_blank" class="social-btn btn-yt py-3 text-[11px]">
                    <i class="fab fa-youtube"></i> YOUTUBE
                </a>
                <a href="https://www.instagram.com/thebreakdownbro?igsh=MXdqeWw3MTZiZTkwZA==" target="_blank" class="social-btn btn-ig py-3 text-[11px]">
                    <i class="fab fa-instagram"></i> INSTAGRAM
                </a>
                <a href="https://whatsapp.com/channel/0029VbCnqlq3bbUxmrkLQS23" target="_blank" class="social-btn btn-wa py-3 text-[11px]">
                    <i class="fab fa-whatsapp"></i> WHATSAPP
                </a>
                <a href="https://t.me/MOVIES24X7_BOT" target="_blank" class="social-btn btn-bot py-3 text-[11px]">
                    <i class="fas fa-robot"></i> OUR BOT
                </a>
            </div>
        </div>

        <footer class="text-center py-10 border-t border-white/5 opacity-60">
            <p class="text-[10px] tracking-widest uppercase font-bold">
                © <script>document.write(new Date().getFullYear())</script> {{name}} | THE BREAKDOWN BROS
            </p>
        </footer>
    </div>

    <script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const player = new Plyr('#player', {
                controls: ['play-large', 'play', 'progress', 'current-time', 'mute', 'volume', 'settings', 'pip', 'fullscreen']
            });
        });
        
        // Right Click Disable Logic
        document.addEventListener("contextmenu", e => e.preventDefault());
        document.addEventListener('keydown', e => {
            if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && e.key === 'I') || (e.ctrlKey && e.key === 'u')) e.preventDefault();
        });
    </script>
</body>
</html>
