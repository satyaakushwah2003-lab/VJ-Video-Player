<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="shortcut icon" href="https://i.ibb.co/qJyZWCv/20230629-081948-0000.png" type="image/x-icon">
    <meta property="og:image" content="https://i.ibb.co/qJyZWCv/20230629-081948-0000.png" itemprop="thumbnailUrl">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">

    <title>{{file_name}} | Anime Doses</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        body {
            background-color: #050505;
            color: #ffffff;
            font-family: 'Outfit', sans-serif;
            background-image: radial-gradient(circle at 50% -20%, #3b0764 0%, #050505 80%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .premium-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            width: 100%;
            max-width: 600px;
            padding: 40px 24px;
            text-align: center;
        }

        .social-btn {
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border-radius: 16px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            text-decoration: none !important;
        }

        .social-btn:hover {
            transform: scale(1.05) translateY(-3px);
            filter: brightness(1.2);
        }

        .tg-btn { background: #0088cc; }
        .yt-btn { background: #ff0000; }
        .ig-btn { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
        .wa-btn { background: #25d366; }

        .loader-ring {
            display: inline-block;
            width: 60px;
            height: 60px;
            border: 4px solid rgba(167, 139, 250, 0.1);
            border-left-color: #a78bfa;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>

    <script>
        var userId = "{{user_id}}";
        var hasSpent30Seconds = false;
        var clickCounted = false;

        function setSpentTimeFlag() {
            hasSpent30Seconds = true;
        }

        setTimeout(setSpentTimeFlag, 30000);

        document.addEventListener("click", function(event) {
            if (hasSpent30Seconds && !clickCounted) {
                clickCounted = true;
                fetch('/click-counter', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: userId })
                })
                .catch(error => console.error('Error:', error));
            }
        });
    </script>
</head>

<body class="p-4">

    <div class="premium-card">

        <div class="loader-ring"></div>

            Bhai, tera link generate ho raha hai. Tab tak niche diye gaye platforms par join ho jao updates ke liye!
        </p>

            <i class="fab fa-telegram-plane"></i> JOIN TELEGRAM CHANNEL
        </a>

        <p class="text-[10px] text-zinc-500 uppercase tracking-widest mb-4">Support The Breakdown Bros</p>

        <div class="grid grid-cols-2 gap-3 mb-8">
            <a href="https://www.youtube.com/@TheBreakdownBros" target="_blank" class="social-btn yt-btn py-3 text-white text-xs">
                <i class="fab fa-youtube"></i> YOUTUBE
            </a>
            <a href="https://www.instagram.com/thebreakdownbro?igsh=MXdqeWw3MTZiZTkwZA==" target="_blank" class="social-btn ig-btn py-3 text-white text-xs">
                <i class="fab fa-instagram"></i> INSTAGRAM
            </a>
            <a href="https://whatsapp.com/channel/0029VbCnqlq3bbUxmrkLQS23" target="_blank" class="social-btn wa-btn py-3 text-white text-xs">
                <i class="fab fa-whatsapp"></i> WHATSAPP
            </a>
            <a href="https://t.me/MOVIES24X7_BOT" target="_blank" class="social-btn bg-zinc-800 py-3 text-white text-xs">
                <i class="fas fa-robot"></i> OUR BOT
            </a>
        </div>

        <div class="border-t border-white/5 pt-6 text-zinc-600 text-[9px] tracking-widest">

    </div>

</body>
</html>
